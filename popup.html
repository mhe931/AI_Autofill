<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=300">
</head>
<body style="margin:0; padding:0; background-color:#121212;">
<div style="width: 300px; padding: 10px; text-align: center; background-color: #121212; color: #ffffff; box-sizing: border-box;">
    <h3 style="margin-top:0; color: #f2c100;">AI Form Filler</h3>
    <button id="extractBtn" style="background:#1e1e1e; color:#f2c100; border:1px solid #f2c100; padding:10px; width:100%; cursor:pointer; border-radius:4px; margin-bottom: 5px;">1 &rarr; Extract Form HTML</button>
    <button id="pasteBtn" style="background:#1e1e1e; color:#f2c100; border:1px solid #f2c100; padding:10px; width:100%; cursor:pointer; border-radius:4px; margin-bottom: 5px;">2 &rarr; Paste to LLM</button>
    <textarea id="jsonInput" placeholder="Step 1: Click Extract (prompt appears here + clipboard).&#10;Step 2: Paste to LLM on the AI page.&#10;Step 3: Copy AI JSON response, paste here, click Execute." style="width: 100%; height: 80px; margin-bottom: 5px; box-sizing: border-box; font-family: monospace; font-size: 10px; background:#1e1e1e; color: #ffffff; border: 1px solid #333;"></textarea>
    <button id="injectBtn" style="background:#f2c100; color:#121212; border:none; padding:10px; width:100%; cursor:pointer; border-radius:4px; margin-bottom: 10px; font-weight: bold;">3 &rarr; Execute Injection</button>

    <div id="msg-container" style="display:none; margin:10px 0; padding:10px; border-radius:4px; background:#2a2a2a; border:1px solid #f2c100; color:#f2c100; font-size:12px; max-height:80px; overflow-y:auto; box-sizing:border-box; text-align:left; line-height:1.4;"></div>

    <!-- Data Management Section -->
    <div style="border-top: 1px solid #333; padding-top: 10px; margin-top: 5px;">
        <h4 style="margin: 0 0 5px 0; color: #f2c100;">Data Management</h4>
        <button id="captureBtn" style="background:#1e1e1e; color:#ffffff; border:1px solid #333; padding:5px; width:100%; cursor:pointer; border-radius:4px; margin-bottom: 3px; font-size: 11px;">Capture Current Form Data</button>
        <button id="viewBtn" style="background:#1e1e1e; color:#ffffff; border:1px solid #333; padding:5px; width:100%; cursor:pointer; border-radius:4px; margin-bottom: 3px; font-size: 11px;">View Data Table</button>
        <div style="display: flex; gap: 4px;">
            <button id="exportBtn" style="background:#1e1e1e; color:#ffffff; border:1px solid #333; padding:5px; width:50%; cursor:pointer; border-radius:4px; font-size: 11px;">Export (.json)</button>
            <button id="importBtn" style="background:#1e1e1e; color:#ffffff; border:1px solid #333; padding:5px; width:50%; cursor:pointer; border-radius:4px; font-size: 11px;">Import Backup</button>
        </div>
        <input type="file" id="fileInput" style="display: none;" accept=".json">
    </div>
    <p style="font-size:10px; margin-top:10px;"><a href="help.html" target="_blank" style="color:#f2c100; text-decoration:none;">View Help &amp; Instructions</a></p>
</div>
<script src="popup.js"></script>
</body>
</html>
