<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=300">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #121212; font-family: 'Segoe UI', sans-serif; }
        .container { width: 300px; padding: 10px; text-align: center; background-color: #121212; color: #ffffff; }
        h3 { color: #f2c100; margin-bottom: 8px; }
        .main-btn { background: #1e1e1e; color: #f2c100; border: 1px solid #f2c100; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; margin-bottom: 5px; font-size: 13px; }
        .main-btn:hover { background: #2a2a2a; }
        .primary-btn { background: #f2c100; color: #121212; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; margin-bottom: 10px; font-weight: bold; font-size: 13px; }
        .primary-btn:hover { background: #d4a900; }
        .textarea-controls { display: flex; gap: 4px; margin-bottom: 4px; }
        .ctrl-btn { background: #1e1e1e; color: #aaa; border: 1px solid #333; padding: 4px; flex: 1; cursor: pointer; border-radius: 3px; font-size: 10px; }
        .ctrl-btn:hover { color: #f2c100; border-color: #f2c100; }
        #jsonInput { width: 100%; height: 80px; margin-bottom: 5px; font-family: monospace; font-size: 10px; background: #1e1e1e; color: #ffffff; border: 1px solid #333; border-radius: 4px; padding: 6px; resize: vertical; }
        #msg-container { display: none; margin: 8px 0; padding: 8px 10px; border-radius: 4px; background: #2a2a2a; border: 1px solid #f2c100; color: #f2c100; font-size: 11px; max-height: 80px; overflow-y: auto; text-align: left; line-height: 1.4; }
        .section { border-top: 1px solid #333; padding-top: 8px; margin-top: 8px; }
        .section h4 { color: #f2c100; margin-bottom: 5px; font-size: 12px; }
        .data-btn { background: #1e1e1e; color: #ffffff; border: 1px solid #333; padding: 5px; width: 100%; cursor: pointer; border-radius: 4px; margin-bottom: 3px; font-size: 11px; }
        .data-btn:hover { border-color: #666; }
        .data-row { display: flex; gap: 4px; }
        .data-row .data-btn { width: 50%; }
        .toggle-btn { background: none; color: #f2c100; border: 1px solid #333; padding: 5px 10px; width: 100%; cursor: pointer; border-radius: 4px; font-size: 11px; text-align: left; }
        .toggle-btn:hover { border-color: #f2c100; }
        .profile-area { display: none; margin-top: 5px; }
        #profileInput { width: 100%; height: 100px; font-family: monospace; font-size: 10px; background: #1e1e1e; color: #ffffff; border: 1px solid #333; border-radius: 4px; padding: 6px; resize: vertical; margin-bottom: 5px; }
        .profile-controls { display: flex; gap: 4px; }
        .checkbox-container { text-align: left; margin-bottom: 8px; font-size: 11px; color: #aaa; }
        .checkbox-container label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .footer-link { font-size: 10px; margin-top: 10px; }
        .footer-link a { color: #f2c100; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h3>AI Form Filler</h3>
    <button id="extractBtn" class="main-btn">1 &rarr; Extract Form HTML</button>
    <div class="checkbox-container">
        <label><input type="checkbox" id="includeHistoryCb"> Include Data Table in Prompt</label>
    </div>
    <button id="pasteBtn" class="main-btn">2 &rarr; Paste to LLM</button>
    <div class="textarea-controls">
        <button id="clearBtn" class="ctrl-btn">Clear</button>
        <button id="copyBtn" class="ctrl-btn">Copy</button>
        <button id="clipPasteBtn" class="ctrl-btn">Paste</button>
    </div>
    <textarea id="jsonInput" placeholder="Step 1: Click Extract (prompt appears here + clipboard).&#10;Step 2: Paste to LLM on the AI chat page.&#10;Step 3: Copy AI JSON, paste here, click Execute."></textarea>
    <button id="injectBtn" class="primary-btn">3 &rarr; Execute Injection</button>

    <div id="msg-container"></div>

    <!-- User Profile Section -->
    <div class="section">
        <button id="profileToggle" class="toggle-btn">User Profile [click to expand]</button>
        <div id="profileArea" class="profile-area">
            <textarea id="profileInput" placeholder="Paste your resume, professional bio, or any personal context here.&#10;&#10;This text is injected into the LLM prompt when you click Extract.&#10;It persists across sessions automatically."></textarea>
            <div class="profile-controls">
                <button id="profileSaveBtn" class="ctrl-btn">Save Profile</button>
                <button id="profileClearBtn" class="ctrl-btn">Clear Profile</button>
            </div>
        </div>
    </div>

    <!-- Data Management -->
    <div class="section">
        <h4>Data Management</h4>
        <button id="captureBtn" class="data-btn">Capture Current Form Data</button>
        <button id="viewBtn" class="data-btn">View Data Table</button>
        <div class="data-row">
            <button id="exportBtn" class="data-btn">Export (.json)</button>
            <button id="importBtn" class="data-btn">Import Backup</button>
        </div>
        <button id="clearDataBtn" class="data-btn" style="margin-top: 3px; color: #ff5555; border-color: #552222; background: #2a1111;">Clear Data Table</button>
        <input type="file" id="fileInput" style="display: none;" accept=".json">
    </div>
    <p class="footer-link"><a href="help.html" target="_blank">View Help &amp; Instructions</a></p>
</div>
<script src="popup.js"></script>
</body>
</html>
